name: terrarun-tests

services:
  certs:
    build:
      context: ./tests/e2e
      dockerfile: Dockerfile.certs
    command: bash /scripts/generate_ssl.sh
    working_dir: /tmp
    volumes:
      - ./tests/e2e/scripts:/scripts
      - certs:/certs

  traefik:
    depends_on:
      certs:
        condition: service_completed_successfully
    ports: !reset []
    volumes: !override
      - certs:/ssl:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/dynamic_conf/conf.yml:ro
    expose:
      - 443

  test-runner:
    depends_on:
      certs:
        condition: service_completed_successfully
    image: hashicorp/terraform
    command: version
    volumes:
      - certs:/etc/ssl/certs:ro
      - terraform:/root/.terraform.d/
      - ./tests/e2e:/tests

  agent:
    restart: unless-stopped
    entrypoint:  !reset null
    build: !reset null
    image: hashicorp/tfc-agent
    environment:
      TFC_AGENT_TOKEN: $TFC_AGENT_TOKEN
      TFC_AGENT_ACCEPT: plan,apply
      TFC_ADDRESS: https://terrarun
    volumes:
      - certs:/etc/ssl/certs:ro
    networks:
      - web
      - default
    depends_on:
      traefik:
      api:
      certs:
        condition: service_completed_successfully
    links:
      - "traefik:terrarun"


volumes:
  certs:
  terraform: