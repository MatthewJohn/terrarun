name: terrarun-tests

services:
  traefik:
    ports: !override
      # Open traefik http [80] and https [443] ports.
      - '5580:80'
      - '55443:443'
      - '5588:8080'
    
    expose:
      - 443

  test-runner:
    image: hashicorp/terraform
    command: version
    volumes:
      - /etc/ssl/certs:/etc/ssl/certs:ro

#      - certs:/etc/ssl/certs:ro
      - ./tests/e2e:/tests

  agent:
    restart: unless-stopped
    # entrypoint:  !reset null
    entrypoint: tail -f /dev/null
    build: !reset null
    image: hashicorp/tfc-agent
    volumes:
      - /etc/ssl/certs:/etc/ssl/certs:ro
 #     - certs:/etc/ssl/certs:ro
    networks:
      - web
      - default
    depends_on:
      - traefik
      - api
    env_file:
      - .env
    links:
      - "traefik:terrarun"


volumes:
  certs: